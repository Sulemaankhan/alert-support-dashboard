server.port=8081

# Use 8081 by default so the app still starts when another process already uses 8080.
# Override: set SERVER_PORT=8080 (or any port) before starting.
spring.application.name=jira-support-alert

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

app.monitoring.interval-ms=15000
