server.port=8081
spring.application.name=jira-support-alert

# Google OAuth client ID (Gmail SSO). Set when starting the service (CLI wins over env):
#   --support.auth.google-client-id=YOUR_ID.apps.googleusercontent.com
# Or set environment variable GOOGLE_CLIENT_ID. See google-oauth.properties.example.
support.auth.google-client-id=${GOOGLE_CLIENT_ID:}

# Logs directory is created under the process working directory (project root when run from IDE).
logging.file.path=logs
logging.level.root=INFO
logging.level.com.support.alert=DEBUG

# Defaults for POST /api/email/inbox (email and password are sent from the UI per search).
support.email.imap.port=993
support.email.imap.folder=INBOX
support.email.imap.max-results=50

# Sign-in: Gmail SSO via Google OAuth. Set enabled=false to disable auth locally.
support.auth.enabled=true
support.auth.session-ttl-hours=12
support.auth.google-sso-only=true
# Jira Cloud: POST /api/alerts/{id}/jira/issue creates an issue (error details → description, severity → priority).
support.jira.enabled=false
support.jira.site-url=
support.jira.email=
support.jira.api-token=
support.jira.project-key=
support.jira.issue-type=Task
support.jira.set-priority=true
